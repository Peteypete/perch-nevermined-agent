<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Minimal bird perching on a bar — works as icon/favicon -->

  <!-- Branch/bar the bird sits on -->
  <rect x="20" y="78" width="80" height="4" rx="2" fill="#16a34a"/>

  <!-- Bird body — simple teardrop -->
  <path d="M62 78 C62 78 72 68 72 56 C72 44 62 36 54 36 C46 36 38 44 38 54 C38 62 42 70 50 76 L50 78" fill="#15803d"/>

  <!-- Wing detail -->
  <path d="M44 54 C44 54 52 50 58 56 C64 62 60 72 56 76" stroke="#0f5132" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="56" cy="38" r="10" fill="#16a34a"/>

  <!-- Eye -->
  <circle cx="59" cy="36" r="2.5" fill="white"/>
  <circle cx="59.5" cy="35.5" r="1.2" fill="#14532d"/>

  <!-- Beak -->
  <path d="M66 37 L72 35 L66 39 Z" fill="#f59e0b"/>

  <!-- Tail feathers -->
  <path d="M38 54 L24 44 L30 54" fill="#15803d"/>
  <path d="M38 58 L22 52 L30 58" fill="#16a34a"/>

  <!-- Legs -->
  <line x1="52" y1="78" x2="52" y2="84" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="78" x2="60" y2="84" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Feet/grip on bar -->
  <path d="M48 84 L52 84 L56 84" stroke="#14532d" stroke-width="2" stroke-linecap="round"/>
  <path d="M56 84 L60 84 L64 84" stroke="#14532d" stroke-width="2" stroke-linecap="round"/>
</svg>
