<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Geometric/abstract bird — modern, minimal, tech-forward -->

  <!-- Bird body — single clean shape -->
  <path d="M40 82 L40 50 C40 38 50 28 62 28 C74 28 82 38 82 50 L82 56 L70 50 L70 82 Z" fill="#16a34a"/>

  <!-- Wing — angular overlay -->
  <path d="M40 58 L40 82 L70 82 L70 62 Z" fill="#15803d"/>

  <!-- Tail -->
  <path d="M40 58 L22 42 L28 58 Z" fill="#22c55e"/>

  <!-- Eye -->
  <circle cx="70" cy="40" r="4" fill="white"/>
  <circle cx="71" cy="39" r="2" fill="#14532d"/>

  <!-- Beak -->
  <path d="M82 44 L96 38 L82 50 Z" fill="#f59e0b"/>

  <!-- Perch bar -->
  <rect x="14" y="82" width="92" height="5" rx="2.5" fill="#14532d"/>

  <!-- Legs -->
  <rect x="50" y="82" width="3" height="6" rx="1" fill="#14532d"/>
  <rect x="62" y="82" width="3" height="6" rx="1" fill="#14532d"/>
</svg>
