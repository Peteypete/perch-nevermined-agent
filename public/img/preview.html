<!DOCTYPE html>
<html>
<head>
  <title>Perch Logo Options</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-100 min-h-screen p-10">
  <h1 class="text-3xl font-bold text-gray-900 mb-2">Perch Logo Options</h1>
  <p class="text-gray-500 mb-10">Bird perching on a bar — works as icon, favicon, nav logo</p>

  <div class="grid grid-cols-3 gap-8 max-w-5xl">
    <!-- Option A -->
    <div class="text-center">
      <h3 class="font-bold text-lg mb-4">A. Detailed Bird</h3>
      <div class="bg-white rounded-2xl shadow-lg p-8 mb-4">
        <img src="logo-bird.svg" class="w-48 h-48 mx-auto">
      </div>
      <div class="flex items-center justify-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-green-500 to-green-700 p-1.5 shadow-md">
          <img src="logo-bird.svg" class="w-full h-full">
        </div>
        <div class="w-9 h-9 rounded-lg bg-white border border-gray-200 p-1 shadow">
          <img src="logo-bird.svg" class="w-full h-full">
        </div>
        <div class="w-6 h-6 rounded bg-green-800 p-0.5">
          <img src="logo-bird.svg" class="w-full h-full">
        </div>
      </div>
      <p class="text-sm text-gray-400 mt-3">Friendly, approachable</p>
    </div>

    <!-- Option B -->
    <div class="text-center">
      <h3 class="font-bold text-lg mb-4">B. Geometric</h3>
      <div class="bg-white rounded-2xl shadow-lg p-8 mb-4">
        <img src="logo-geometric.svg" class="w-48 h-48 mx-auto">
      </div>
      <div class="flex items-center justify-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-green-500 to-green-700 p-1.5 shadow-md">
          <img src="logo-geometric.svg" class="w-full h-full">
        </div>
        <div class="w-9 h-9 rounded-lg bg-white border border-gray-200 p-1 shadow">
          <img src="logo-geometric.svg" class="w-full h-full">
        </div>
        <div class="w-6 h-6 rounded bg-green-800 p-0.5">
          <img src="logo-geometric.svg" class="w-full h-full">
        </div>
      </div>
      <p class="text-sm text-gray-400 mt-3">Bold, tech-forward</p>
    </div>

    <!-- Option C -->
    <div class="text-center">
      <h3 class="font-bold text-lg mb-4">C. Minimal Stroke</h3>
      <div class="bg-white rounded-2xl shadow-lg p-8 mb-4">
        <img src="logo-minimal.svg" class="w-48 h-48 mx-auto">
      </div>
      <div class="flex items-center justify-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-green-500 to-green-700 p-1.5 shadow-md">
          <img src="logo-minimal.svg" class="w-full h-full">
        </div>
        <div class="w-9 h-9 rounded-lg bg-white border border-gray-200 p-1 shadow">
          <img src="logo-minimal.svg" class="w-full h-full">
        </div>
        <div class="w-6 h-6 rounded bg-green-800 p-0.5">
          <img src="logo-minimal.svg" class="w-full h-full">
        </div>
      </div>
      <p class="text-sm text-gray-400 mt-3">Clean, signature-style</p>
    </div>
  </div>

  <div class="mt-12 max-w-5xl">
    <h3 class="font-bold text-lg mb-4">In context (nav bar)</h3>
    <div class="bg-white rounded-xl shadow p-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-green-500 to-green-700 p-1 shadow-md">
        <img src="logo-geometric.svg" class="w-full h-full">
      </div>
      <div>
        <div class="text-lg font-bold text-gray-900 leading-tight">Perch</div>
        <div class="text-xs text-gray-400 -mt-0.5">Tax & Finance Expert</div>
      </div>
    </div>
  </div>
</body>
</html>
